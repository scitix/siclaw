# Skills PV — shared RWX volume
# Gateway mounts RW (writes skill files), AgentBox mounts RO (reads skill files)
#
# Deploy: kubectl apply -f k8s/siclaw-skills-pvc.yaml -n siclaw

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: siclaw-skills
  namespace: siclaw
  labels:
    app: siclaw
    component: skills
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-siclaw
  resources:
    requests:
      storage: 10Gi
