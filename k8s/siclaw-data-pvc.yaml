# Shared data PVC — user memory, investigations, sessions.
#
# This single PVC is shared by Runtime and all AgentBox pods.
# Runtime creates per-user subdirectories (users/{userId}/{agentId}/);
# AgentBox pods mount via subPath for isolation.
#
# Requirements:
#   - Must support ReadWriteMany (e.g. NFS, CephFS, EFS)
#   - Must be created before deploying siclaw
#
# Deploy: kubectl apply -f k8s/siclaw-data-pvc.yaml -n siclaw

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: siclaw-data
  namespace: siclaw
  labels:
    app: siclaw
    component: data
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 10Gi
