# AgentBox Pod Template
# Reference document — shows what K8sSpawner creates programmatically.
# Not consumed at runtime; kept in sync with k8s-spawner.ts for documentation.
#
# Variables:
#   ${USER_ID}      - User identifier
#   ${IMAGE}        - Container image (e.g., siclaw-agentbox:latest)
#   ${NAMESPACE}    - Kubernetes namespace
#   ${WORKSPACE_ID} - Workspace identifier (e.g., "default")

apiVersion: v1
kind: Pod
metadata:
  name: agentbox-${USER_ID}
  namespace: ${NAMESPACE}
  labels:
    app: agentbox
    siclaw.io/app: agentbox
    siclaw.io/user: ${USER_ID}
    siclaw.io/workspace: ${WORKSPACE_ID}
spec:
  automountServiceAccountToken: false
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  securityContext:
    seccompProfile:
      type: RuntimeDefault

  containers:
  - name: agentbox
    image: ${IMAGE}
    imagePullPolicy: Always
    securityContext:
      capabilities:
        drop: ["ALL"]
        add: ["SETUID", "SETGID", "CHOWN", "FOWNER", "AUDIT_WRITE"]
      readOnlyRootFilesystem: true

    ports:
    - name: https
      containerPort: 3000
      protocol: TCP
    - name: metrics
      containerPort: 9090
      protocol: TCP

    env:
    - name: PI_CODING_AGENT_DIR
      value: ".siclaw/user-data/agent"
    - name: SICLAW_GATEWAY_URL
      value: "https://siclaw-gateway.${NAMESPACE}.svc.cluster.local:3002"
    - name: SICLAW_WORKSPACE_ID
      value: "${WORKSPACE_ID}"
    # LLM config + settings.json are injected dynamically by gateway via RPC

    # Resource limits
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

    # Health probes
    readinessProbe:
      httpGet:
        path: /health
        port: 3000
        scheme: HTTPS
      initialDelaySeconds: 2
      periodSeconds: 2

    livenessProbe:
      httpGet:
        path: /health
        port: 3000
        scheme: HTTPS
      initialDelaySeconds: 10
      periodSeconds: 10

    # Volume mounts
    volumeMounts:
    - name: credentials
      mountPath: /app/.siclaw/credentials
    - name: config
      mountPath: /app/.siclaw/config
    - name: skills-local
      mountPath: /app/.siclaw/skills
    - name: user-data
      mountPath: /app/.siclaw/user-data
      subPath: users/${USER_ID}/${WORKSPACE_ID}
    - name: client-cert
      mountPath: /etc/siclaw/certs
      readOnly: true
    - name: tmp
      mountPath: /tmp

  volumes:
  # Credentials (synced from gateway via RPC)
  - name: credentials
    emptyDir: {}
  # Config directory (settings.json written at runtime)
  - name: config
    emptyDir: {}
  # Skills (synced from gateway via RPC buildSkillBundle)
  - name: skills-local
    emptyDir: {}
  # User data (memory, investigations, sessions) — persistent on shared PVC
  - name: user-data
    persistentVolumeClaim:
      claimName: siclaw-data
  # mTLS client certificate
  - name: client-cert
    secret:
      secretName: agentbox-${USER_ID}-cert
  # Temp directory
  - name: tmp
    emptyDir:
      sizeLimit: 500Mi

---
# Service for accessing the AgentBox pod
apiVersion: v1
kind: Service
metadata:
  name: agentbox-${USER_ID}
  namespace: ${NAMESPACE}
  labels:
    app: agentbox
    siclaw.io/user: ${USER_ID}
spec:
  type: ClusterIP
  selector:
    app: agentbox
    siclaw.io/user: ${USER_ID}
  ports:
  - name: https
    port: 3000
    targetPort: 3000
    protocol: TCP
