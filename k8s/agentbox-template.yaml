# AgentBox Pod Template
# This template is used by K8sSpawner to create per-user AgentBox pods
#
# Variables to substitute:
#   ${USER_ID}      - User identifier
#   ${IMAGE}        - Container image (e.g., siclaw-agentbox:latest)
#   ${NAMESPACE}    - Kubernetes namespace
#   ${WORKSPACE_ID} - Workspace identifier (e.g., "default")
#
apiVersion: v1
kind: Pod
metadata:
  name: agentbox-${USER_ID}
  namespace: ${NAMESPACE}
  labels:
    app: agentbox
    siclaw.io/app: agentbox
    user: ${USER_ID}
    managed-by: siclaw-gateway
spec:
  automountServiceAccountToken: false
  restartPolicy: Never
  terminationGracePeriodSeconds: 30

  containers:
  - name: agentbox
    image: ${IMAGE}
    imagePullPolicy: Always

    ports:
    - name: https
      containerPort: 3000
      protocol: TCP
    - name: metrics
      containerPort: 9090
      protocol: TCP

    env:
    - name: USER_ID
      value: "${USER_ID}"
    - name: NODE_ENV
      value: "production"
    - name: SICLAW_AGENTBOX_PORT
      value: "3000"
    - name: PI_CODING_AGENT_DIR
      value: ".siclaw/user-data/agent"
    - name: SICLAW_SKILLS_DIR
      value: ".siclaw/skills"
    - name: SICLAW_USER_DATA_DIR
      value: ".siclaw/user-data"
    - name: SICLAW_GATEWAY_URL
      value: "https://siclaw-gateway.${NAMESPACE}.svc.cluster.local:3002"
    - name: SICLAW_CREDENTIALS_DIR
      value: "/home/agentbox/.credentials"
    # LLM/S3 config is injected dynamically by gateway via envResolver

    # Resource limits
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    # Health probes
    livenessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /health
        port: 3000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

    # Volume mounts
    volumeMounts:
    - name: kubeconfig
      mountPath: /home/agentbox/.kube
      readOnly: true
    - name: tmp
      mountPath: /tmp
    - name: workspace
      mountPath: /workspace
    # Skills & MCP mounts (from shared PVC)
    - name: skills-pv
      mountPath: /app/.siclaw/skills/core
      subPath: core
      readOnly: true
    - name: skills-pv
      mountPath: /app/.siclaw/skills/team
      subPath: team
      readOnly: true
    - name: skills-pv
      mountPath: /app/.siclaw/skills/user
      subPath: user/${USER_ID}/.ws-${WORKSPACE_ID}
      readOnly: true
    - name: skills-pv
      mountPath: /app/.siclaw/user-data
      subPath: user/${USER_ID}/agent-data
    - name: skills-pv
      mountPath: /home/agentbox/.credentials
      subPath: user/${USER_ID}/.ws-${WORKSPACE_ID}/.credentials
      readOnly: true
    - name: skills-pv
      mountPath: /home/agentbox/.kube/envs
      subPath: user/${USER_ID}/.kube/envs
      readOnly: true
    - name: skills-pv
      mountPath: /home/agentbox/.kube/defaults
      subPath: _default_kubeconfigs
      readOnly: true

  volumes:
  # User-specific kubeconfig (optional)
  - name: kubeconfig
    secret:
      secretName: user-${USER_ID}-kubeconfig
      optional: true
  # Temp directory
  - name: tmp
    emptyDir:
      sizeLimit: 500Mi
  # Workspace for user files
  - name: workspace
    emptyDir:
      sizeLimit: 1Gi
  # Shared skills PVC
  - name: skills-pv
    persistentVolumeClaim:
      claimName: siclaw-skills

---
# Service for accessing the AgentBox pod
apiVersion: v1
kind: Service
metadata:
  name: agentbox-${USER_ID}
  namespace: ${NAMESPACE}
  labels:
    app: agentbox
    user: ${USER_ID}
spec:
  type: ClusterIP
  selector:
    app: agentbox
    user: ${USER_ID}
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP

