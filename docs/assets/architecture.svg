<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="890" viewBox="0 0 1200 890" font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6B7280"/>
    </marker>
    <marker id="arr-gray-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0,0 3.5,10 7" fill="#6B7280"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0,10 3.5,0 7" fill="none" stroke="#D97706" stroke-width="1.5"/>
    </marker>
    <marker id="arr-amber-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polyline points="10 0,0 3.5,10 7" fill="none" stroke="#D97706" stroke-width="1.5"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#0D9488"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="1200" height="890" fill="white"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 1: User Interfaces                               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="12" width="1160" height="90" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="20" y1="37" x2="1180" y2="37" stroke="#3B82F6" stroke-width="1"/>
  <text x="600" y="28" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#1D4ED8">User Interfaces</text>

  <!-- L1 children -->
  <rect x="30" y="44" width="255" height="42" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="157" y="65" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1E40AF">TUI / CLI</text>

  <rect x="295" y="44" width="200" height="42" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="395" y="65" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1E40AF">Web UI</text>

  <rect x="505" y="44" width="380" height="42" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="695" y="65" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1E40AF">Slack / Discord / Telegram / Lark</text>

  <rect x="895" y="44" width="275" height="42" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="1032" y="65" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#1E40AF">Webhooks / Cron</text>

  <!-- Arrow E1: L1 → L2 -->
  <line x1="600" y1="102" x2="600" y2="140" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="517" y="111" width="167" height="18" rx="3" fill="white"/>
  <text x="600" y="120" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#374151">HTTP / WebSocket</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 2: Gateway                                       -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="142" width="1160" height="90" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="20" y1="167" x2="1180" y2="167" stroke="#7C3AED" stroke-width="1"/>
  <text x="600" y="158" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#5B21B6">Gateway  ·  Control Plane</text>

  <!-- L2 children -->
  <rect x="30" y="174" width="220" height="42" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="140" y="195" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#4C1D95">Auth (JWT / SSO / OIDC)</text>

  <rect x="260" y="174" width="185" height="42" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="352" y="195" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#4C1D95">Session Manager</text>

  <rect x="455" y="174" width="185" height="42" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="547" y="195" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#4C1D95">Skill Management</text>

  <rect x="650" y="174" width="185" height="42" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="742" y="195" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#4C1D95">Cron Scheduler</text>

  <rect x="845" y="174" width="325" height="42" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="1007" y="195" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#4C1D95">DB: MySQL / SQLite</text>

  <!-- Arrow E2: L2 → L3 -->
  <line x1="600" y1="232" x2="600" y2="268" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="492" y="241" width="216" height="18" rx="3" fill="white"/>
  <text x="600" y="250" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#374151">mTLS (K8s) / HTTP (local)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 3: AgentBox                                      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="270" width="1160" height="285" rx="6" fill="#F0FDFA" stroke="#0D9488" stroke-width="1.5"/>
  <line x1="20" y1="295" x2="1180" y2="295" stroke="#0D9488" stroke-width="1"/>
  <text x="600" y="283" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#0F766E">AgentBox  ·  Execution Plane  (one per user  —  K8s Pod or in-process)</text>

  <!-- Agent Brain sub-box -->
  <rect x="30" y="302" width="255" height="115" rx="5" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.2"/>
  <line x1="30" y1="322" x2="285" y2="322" stroke="#0D9488" stroke-width="0.8"/>
  <text x="157" y="313" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="#0F766E">Agent Brain</text>
  <rect x="40" y="328" width="235" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="157" y="361" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">pi-agent · claude-sdk</text>

  <!-- Tools sub-box -->
  <rect x="295" y="302" width="580" height="115" rx="5" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.2"/>
  <line x1="295" y1="322" x2="875" y2="322" stroke="#0D9488" stroke-width="0.8"/>
  <text x="585" y="313" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="#0F766E">Tools</text>
  <rect x="303" y="328" width="100" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="353" y="357" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">bash</text>
  <text x="353" y="373" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">(whitelist)</text>
  <rect x="411" y="328" width="100" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="461" y="357" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">kubectl</text>
  <text x="461" y="373" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">(read-only)</text>
  <rect x="519" y="328" width="100" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="569" y="365" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">pod_exec</text>
  <rect x="627" y="328" width="110" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="682" y="365" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">memory_search</text>
  <rect x="745" y="328" width="122" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="806" y="365" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">MCP Servers</text>

  <!-- Skills sub-box -->
  <rect x="885" y="302" width="285" height="115" rx="5" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.2"/>
  <line x1="885" y1="322" x2="1170" y2="322" stroke="#0D9488" stroke-width="0.8"/>
  <text x="1027" y="313" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="#0F766E">Skills  (3-tier overlay)</text>
  <rect x="893" y="328" width="79" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="932" y="365" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Core</text>
  <rect x="988" y="328" width="79" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="1027" y="365" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Team</text>
  <rect x="1083" y="328" width="79" height="75" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="1122" y="365" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Personal</text>
  <!-- Skills tier arrows -->
  <line x1="972" y1="365" x2="985" y2="365" stroke="#0D9488" stroke-width="1.2" marker-end="url(#arr-teal)"/>
  <line x1="1067" y1="365" x2="1080" y2="365" stroke="#0D9488" stroke-width="1.2" marker-end="url(#arr-teal)"/>

  <!-- Deep Investigation Engine sub-box -->
  <rect x="30" y="427" width="1140" height="112" rx="5" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.2"/>
  <line x1="30" y1="447" x2="1170" y2="447" stroke="#0D9488" stroke-width="0.8"/>
  <text x="600" y="438" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="#0F766E">Deep Investigation Engine</text>
  <rect x="40" y="453" width="245" height="72" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="162" y="480" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Phase 1</text>
  <text x="162" y="496" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Triage</text>
  <rect x="315" y="453" width="245" height="72" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="437" y="480" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Phase 2</text>
  <text x="437" y="496" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Hypotheses</text>
  <rect x="590" y="453" width="245" height="72" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="712" y="471" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Phase 3</text>
  <text x="712" y="487" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Parallel Validation</text>
  <text x="712" y="503" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#0F766E">(3 sub-agents)</text>
  <rect x="865" y="453" width="295" height="72" rx="4" fill="#99F6E4" stroke="#0D9488" stroke-width="1"/>
  <text x="1012" y="471" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Phase 4</text>
  <text x="1012" y="487" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Conclusion +</text>
  <text x="1012" y="503" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#0F766E">Knowledge Extraction</text>
  <!-- Phase arrows -->
  <line x1="285" y1="489" x2="312" y2="489" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="560" y1="489" x2="587" y2="489" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <line x1="835" y1="489" x2="862" y2="489" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Arrow E3: L3 → L4 (center, read/write) -->
  <line x1="600" y1="555" x2="600" y2="598" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="550" y="565" width="100" height="18" rx="3" fill="white"/>
  <text x="600" y="574" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#374151">read / write</text>

  <!-- Arrow E4: L3 → L5 right-side bypass (read-only) -->
  <polyline points="1180,412 1193,412 1193,828 1180,828" fill="none" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="1140" y="599" width="68" height="18" rx="3" fill="white"/>
  <text x="1193" y="608" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#374151">read-only</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 4: Knowledge System                              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="600" width="1160" height="135" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <line x1="20" y1="625" x2="1180" y2="625" stroke="#D97706" stroke-width="1"/>
  <text x="600" y="614" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#92400E">Knowledge System</text>

  <!-- Investigation Memory -->
  <rect x="30" y="632" width="560" height="87" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="310" y="657" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#78350F">Investigation Memory</text>
  <text x="310" y="676" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#78350F">SQLite + FTS5 + bge-m3</text>
  <text x="310" y="695" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#166534">✓ IM Phase 0–1 complete</text>

  <!-- Team Knowledge Base (dashed border) -->
  <rect x="610" y="632" width="560" height="87" rx="5" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="890" y="657" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="bold" fill="#713F12">Team Knowledge Base</text>
  <text x="890" y="676" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#713F12">Qdrant vector DB</text>
  <text x="890" y="695" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#92400E">⚡ KR0 — in progress</text>

  <!-- Arrow E5: L4_im ↔ L3 bidirectional dashed (left side) -->
  <polyline points="30,675 6,675 6,412 20,412" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="6,3" marker-start="url(#arr-amber-rev)" marker-end="url(#arr-amber)"/>
  <!-- E5 label: rotated vertically along left side -->
  <g transform="translate(6,543) rotate(-90)">
    <rect x="-88" y="-9" width="176" height="18" rx="3" fill="white"/>
    <text x="0" y="5" text-anchor="middle" font-size="9" fill="#92400E">inject context / extract knowledge</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LAYER 5: Target Infrastructure                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="778" width="1160" height="90" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="20" y1="803" x2="1180" y2="803" stroke="#6B7280" stroke-width="1"/>
  <text x="600" y="793" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="bold" fill="#374151">Target Infrastructure</text>

  <!-- L5 children -->
  <rect x="30" y="810" width="270" height="42" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="165" y="825" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#374151">Kubernetes Clusters</text>
  <text x="165" y="841" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#6B7280">(kubeconfig)</text>

  <rect x="310" y="810" width="270" height="42" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="445" y="831" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#374151">Prometheus / Grafana</text>

  <rect x="590" y="810" width="270" height="42" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="725" y="831" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#374151">Elasticsearch / Loki</text>

  <rect x="870" y="810" width="300" height="42" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="1020" y="831" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#374151">PagerDuty / Alertmanager</text>

</svg>
