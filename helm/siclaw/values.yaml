# -- Container images
image:
  registry: ""          # e.g. "siclaw" -> siclaw/siclaw-runtime:latest
  pullPolicy: Always
  tag: "latest"

# -- Demo MySQL (testing only, not for production)
mysql:
  enabled: false
  image: mysql:8.0
  database: siclaw
  username: siclaw
  password: ""

# -- Database (MySQL, shared by Runtime + Portal)
database:
  url: ""               # mysql://user:pass@host:3306/siclaw

# -- Agent Runtime
runtime:
  replicas: 1
  jwtSecret: ""         # shared JWT secret (same as Portal/Upstream)
  runtimeSecret: ""       # Portal/Upstream → Runtime WS auth
  portalSecret: ""      # Runtime → Portal/Upstream API auth
  # Where Runtime gets Agent/Credential info from:
  #   Standalone mode: http://siclaw-portal:3003
  #   Upstream mode:     http://upstream-apiserver:8080
  serverUrl: "http://siclaw-portal:3003"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  env: {}

# -- Portal (standalone web UI, replaces Upstream)
portal:
  enabled: true
  replicas: 1
  jwtSecret: ""         # same as runtime.jwtSecret
  runtimeSecret: ""       # same as runtime.runtimeSecret
  portalSecret: ""      # same as runtime.portalSecret
  service:
    type: NodePort
    port: 3003
    nodePort: 31003
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env: {}

# -- AgentBox (spawned at runtime by K8s spawner)
agentbox:
  debugImage: ""
  persistence:
    enabled: false
    claimName: "siclaw-data"

# -- Metrics & Observability
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    namespace: ""
    namespaceSelector: {}
    additionalLabels: {}
  podMonitor:
    enabled: true
    interval: 15s
    namespace: ""
    additionalLabels: {}
  grafanaDashboard:
    enabled: true
    namespace: ""
    additionalLabels: {}
  prometheusRule:
    enabled: false
    namespace: ""
    additionalLabels: {}
    costThresholdPerHour: 10
