# -- Global
nameOverride: ""
fullnameOverride: ""
namespace: siclaw

# -- Container images
image:
  registry: ""          # e.g. "siclaw" -> siclaw/siclaw-gateway:latest; empty -> siclaw-gateway:latest
  pullPolicy: Always
  tag: "latest"

# -- Gateway
gateway:
  replicas: 1
  service:
    type: NodePort
    port: 80
    nodePort: 31000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  env: {}               # extra env vars

# -- AgentBox (spawned at runtime by gateway)
agentbox:
  image:
    # Override registry/tag if agentbox image differs from gateway
    registry: ""        # defaults to image.registry
    repository: ""      # defaults to "siclaw-agentbox"
    tag: ""             # defaults to image.tag
  # User data persistence (memory, investigations, sessions)
  persistence:
    enabled: false          # set to true to persist user memory across pod restarts
    storageClass: ""        # required when enabled (e.g. "nfs-client", "efs-sc", "cephfs")
    accessMode: ReadWriteMany
    size: "1Gi"             # per-user PVC size

# -- Cron
cron:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2"
      memory: "4Gi"
  env: {}

# -- Database (MySQL — SQLite is not supported in K8s mode)
database:
  # Provide URL directly or reference an existing secret
  url: ""
  existingSecret:
    name: ""
    key: "database-url"

# -- Metrics & Observability
metrics:
  enabled: true

  # ServiceMonitor for Gateway (Prometheus Operator)
  serviceMonitor:
    enabled: true
    interval: 15s
    namespace: ""             # defaults to .Values.namespace
    namespaceSelector: {}     # override to { any: true } for cross-namespace
    additionalLabels: {}

  # PodMonitor for AgentBox pods (Prometheus Operator)
  podMonitor:
    enabled: true
    interval: 15s
    namespace: ""             # defaults to .Values.namespace; set to "monitoring" for cross-namespace
    additionalLabels: {}

  # Grafana dashboard (auto-imported via sidecar with grafana_dashboard: "1" label)
  grafanaDashboard:
    enabled: true
    namespace: ""             # defaults to .Values.namespace
    additionalLabels: {}

  # PrometheusRule alert rules
  prometheusRule:
    enabled: false            # opt-in — enable for production
    namespace: ""             # defaults to .Values.namespace
    additionalLabels: {}
    costThresholdPerHour: 10  # USD — alert when hourly cost exceeds this
