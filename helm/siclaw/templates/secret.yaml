{{- if and .Values.database.url (not .Values.database.existingSecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "siclaw.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "database") | nindent 4 }}
type: Opaque
data:
  database-url: {{ .Values.database.url | b64enc | quote }}
{{- end }}
