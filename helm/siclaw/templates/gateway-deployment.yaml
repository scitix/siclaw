apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siclaw.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "siclaw.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "siclaw.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "siclaw.fullname" . }}-gateway
      containers:
        - name: gateway
          image: {{ include "siclaw.image" (dict "component" "gateway" "ctx" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: https-internal
              containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: SICLAW_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SICLAW_AGENTBOX_IMAGE
              value: {{ include "siclaw.agentboxImage" . }}
            {{- if .Values.agentbox.persistence.enabled }}
            - name: SICLAW_PERSISTENCE_ENABLED
              value: "true"
            - name: SICLAW_PERSISTENCE_STORAGE_CLASS
              value: {{ .Values.agentbox.persistence.storageClass | quote }}
            - name: SICLAW_PERSISTENCE_ACCESS_MODE
              value: {{ .Values.agentbox.persistence.accessMode | quote }}
            - name: SICLAW_PERSISTENCE_SIZE
              value: {{ .Values.agentbox.persistence.size | quote }}
            {{- end }}
            {{- if .Values.agentbox.debugImage }}
            - name: SICLAW_DEBUG_IMAGE
              value: {{ .Values.agentbox.debugImage | quote }}
            {{- end }}
            - name: SICLAW_SKILLS_DIR
              value: ".siclaw/skills"
            - name: SICLAW_CRON_SERVICE_URL
              value: "http://{{ include "siclaw.fullname" . }}-cron.{{ .Values.namespace }}.svc.cluster.local"
            - name: SICLAW_GATEWAY_HOSTNAME
              value: "{{ include "siclaw.fullname" . }}-gateway.{{ .Values.namespace }}.svc.cluster.local"
            {{- if .Values.database.existingSecret.name }}
            - name: SICLAW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name }}
                  key: {{ .Values.database.existingSecret.key }}
            {{- else if .Values.database.url }}
            - name: SICLAW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "siclaw.fullname" . }}
                  key: database-url
            {{- end }}
            {{- range $key, $value := .Values.gateway.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: skills
              mountPath: /app/.siclaw/skills
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: skills
          emptyDir: {}
