apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "siclaw.fullname" . }}-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "runtime") | nindent 4 }}
spec:
  replicas: {{ .Values.runtime.replicas }}
  selector:
    matchLabels:
      {{- include "siclaw.selectorLabels" (dict "ctx" . "component" "runtime") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "siclaw.selectorLabels" (dict "ctx" . "component" "runtime") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "siclaw.fullname" . }}-gateway
      containers:
        - name: runtime
          image: {{ include "siclaw.image" (dict "component" "runtime" "ctx" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            - name: https-internal
              containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: SICLAW_PORT
              value: "3001"
            - name: SICLAW_INTERNAL_PORT
              value: "3002"
            - name: SICLAW_HOST
              value: "0.0.0.0"
            - name: SICLAW_K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SICLAW_AGENTBOX_IMAGE
              value: {{ include "siclaw.agentboxImage" . }}
            - name: SICLAW_GATEWAY_HOSTNAME
              value: "{{ include "siclaw.fullname" . }}-runtime.{{ .Release.Namespace }}.svc.cluster.local"
            {{- if .Values.agentbox.persistence.enabled }}
            - name: SICLAW_PERSISTENCE_ENABLED
              value: "true"
            - name: SICLAW_PERSISTENCE_CLAIM_NAME
              value: {{ .Values.agentbox.persistence.claimName | quote }}
            {{- end }}
            {{- if .Values.agentbox.debugImage }}
            - name: SICLAW_DEBUG_IMAGE
              value: {{ .Values.agentbox.debugImage | quote }}
            {{- end }}
            # Database + JWT (shared with Portal/Upstream)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "siclaw.fullname" . }}-runtime
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "siclaw.fullname" . }}-runtime
                  key: jwt-secret
            - name: SICLAW_SKILLS_DIR
              value: ".siclaw/skills"
            # Trusted Proxy secret
            - name: SICLAW_RUNTIME_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "siclaw.fullname" . }}-runtime
                  key: runtime-secret
            # Adapter API — auto-discover Portal if enabled, else use configured URL
            - name: SICLAW_SERVER_URL
              {{- if .Values.portal.enabled }}
              value: "http://{{ include "siclaw.fullname" . }}-portal:{{ .Values.portal.service.port }}"
              {{- else }}
              value: {{ .Values.runtime.serverUrl | quote }}
              {{- end }}
            - name: SICLAW_PORTAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "siclaw.fullname" . }}-runtime
                  key: portal-secret
            {{- range $key, $value := .Values.runtime.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.runtime.resources | nindent 12 }}
          volumeMounts:
            - name: skills
              mountPath: /app/.siclaw/skills
            {{- if .Values.agentbox.persistence.enabled }}
            - name: user-data
              mountPath: /app/.siclaw/user-data
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: skills
          emptyDir: {}
        {{- if .Values.agentbox.persistence.enabled }}
        - name: user-data
          persistentVolumeClaim:
            claimName: {{ .Values.agentbox.persistence.claimName }}
        {{- end }}
