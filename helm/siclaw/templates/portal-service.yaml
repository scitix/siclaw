{{- if .Values.portal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "siclaw.fullname" . }}-portal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "portal") | nindent 4 }}
spec:
  type: {{ .Values.portal.service.type }}
  ports:
    - port: {{ .Values.portal.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.portal.service.type "NodePort") .Values.portal.service.nodePort }}
      nodePort: {{ .Values.portal.service.nodePort }}
      {{- end }}
  selector:
    {{- include "siclaw.selectorLabels" (dict "ctx" . "component" "portal") | nindent 4 }}
{{- end }}
