apiVersion: v1
kind: Secret
metadata:
  name: {{ include "siclaw.fullname" . }}-runtime
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "runtime") | nindent 4 }}
type: Opaque
data:
  database-url: {{ .Values.database.url | b64enc | quote }}
  jwt-secret: {{ .Values.runtime.jwtSecret | b64enc | quote }}
  runtime-secret: {{ .Values.runtime.runtimeSecret | b64enc | quote }}
  portal-secret: {{ .Values.runtime.portalSecret | b64enc | quote }}
