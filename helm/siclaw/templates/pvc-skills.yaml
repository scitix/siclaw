apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "siclaw.fullname" . }}-skills
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "skills") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.persistence.skills.storageClass }}
  storageClassName: {{ .Values.persistence.skills.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.skills.size }}
