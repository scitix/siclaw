{{- if .Values.portal.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "siclaw.fullname" . }}-portal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "portal") | nindent 4 }}
type: Opaque
data:
  database-url: {{ .Values.database.url | b64enc | quote }}
  jwt-secret: {{ .Values.portal.jwtSecret | b64enc | quote }}
  runtime-secret: {{ .Values.portal.runtimeSecret | b64enc | quote }}
  portal-secret: {{ .Values.portal.portalSecret | b64enc | quote }}
{{- end }}
