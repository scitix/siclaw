apiVersion: v1
kind: Service
metadata:
  name: {{ include "siclaw.fullname" . }}-cron-headless
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "cron") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 3100
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "siclaw.selectorLabels" (dict "ctx" . "component" "cron") | nindent 4 }}
