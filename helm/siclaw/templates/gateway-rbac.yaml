apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "siclaw.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "gateway") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "siclaw.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "gateway") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "siclaw.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "siclaw.labels" (dict "ctx" . "component" "gateway") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "siclaw.fullname" . }}-gateway
subjects:
  - kind: ServiceAccount
    name: {{ include "siclaw.fullname" . }}-gateway
    namespace: {{ .Values.namespace }}
