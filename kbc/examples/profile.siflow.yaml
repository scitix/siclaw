# 实例 B:siflow 平台库(几乎裸:只有 markdown + frontmatter,无覆盖/敏感工具)
# —— 同一个框架,这里 dimensions 为空,只跑脊椎。这正是"不假设库长啥样"的活证明。
name: siflow-platform
bundle_root: ~/project/siflow-kb/wiki
constitution: ~/project/kb-method          # 同为 infra 口味;换个域的库就指向别的宪法
audit:
  reserved_extra:                           # 维护/送审页,不计孤儿
    - LEDGER.md
    - 待对齐.md
  link_styles: [markdown]
  dimensions: {}                            # 裸库:无叶子工具
tools_registry: {}
