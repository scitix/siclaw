# kbc L3 平台化 · 本地开发用 Forgejo(git forge 底座)
#
# Forgejo = 我们 fork 的 git forge:给 L3 提供「网站 + git 存储 + issue/PR 评审 + 多租户」。
# kbc 只在它上面造一座桥(forge_client/bridge/worker),不重写这些。
#
#   起:  docker compose -f platform/forge/docker-compose.yml up -d
#   停:  docker compose -f platform/forge/docker-compose.yml down
#   清:  docker compose -f platform/forge/docker-compose.yml down -v   # 连数据一起删,回到干净态
#
# Web: http://localhost:3300   (3000/3001 本机已被占,故用 3300)
services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: kbc-forgejo
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__server__DOMAIN=localhost
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__ROOT_URL=http://localhost:3300/
      - FORGEJO__server__SSH_DOMAIN=localhost
      - FORGEJO__server__SSH_PORT=2222
      # 跳过网页安装向导(用 sqlite、直接锁定),起来即可用
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
    volumes:
      - kbc-forgejo-data:/data
    ports:
      - "3300:3000"   # web
      - "2222:22"     # ssh(可选,bridge 走 HTTP API,不依赖它)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  kbc-forgejo-data:
