# kbc L3 platform · Forgejo for local development (the git-forge substrate)
#
# Forgejo = an open-source, self-hostable git forge. It gives L3 a website +
# git storage + issue/PR review + multi-tenancy. kbc only builds a thin bridge
# on top of it (forge_client/bridge/worker); it does not reimplement any of this.
#
#   up:    docker compose -f platform/forge/docker-compose.yml up -d
#   down:  docker compose -f platform/forge/docker-compose.yml down
#   clean: docker compose -f platform/forge/docker-compose.yml down -v   # also drops the data volume, back to a clean state
#
# Web: http://localhost:3300   (3300 avoids the common local conflicts on 3000/3001)
services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:11
    container_name: kbc-forgejo
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__server__DOMAIN=localhost
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__ROOT_URL=http://localhost:3300/
      - FORGEJO__server__SSH_DOMAIN=localhost
      - FORGEJO__server__SSH_PORT=2222
      # Skip the web install wizard (use sqlite, lock immediately) so it is usable on boot
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
    volumes:
      - kbc-forgejo-data:/data
    ports:
      - "3300:3000"   # web
      - "2222:22"     # ssh (optional; the bridge uses the HTTP API and does not depend on it)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  kbc-forgejo-data:
